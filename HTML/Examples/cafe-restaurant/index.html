<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>咖啡馆展示页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <nav>
      <strong>Morning Cafe</strong>
      <a href="#menu">菜单</a>
      <a href="#visit">到店</a>
    </nav>
    <div class="hero-content">
      <p class="eyebrow">Fresh coffee and quiet mornings</p>
      <h1>一杯咖啡，一段安静的学习时间。</h1>
      <p>这是一个餐厅/咖啡馆页面案例。你可以改成自己的店铺、工作室或活动页面。</p>
    </div>
  </header>

  <main>
    <section id="menu" class="section">
      <div class="section-heading">
        <span>Menu</span>
        <h2>今日推荐</h2>
      </div>
      <div class="menu-grid">
        <article>
          <div class="cup"></div>
          <h3>拿铁</h3>
          <p>柔和奶香与浓缩咖啡。</p>
          <strong>28</strong>
        </article>
        <article>
          <div class="cup alt"></div>
          <h3>冷萃</h3>
          <p>低温慢萃，口感清爽。</p>
          <strong>32</strong>
        </article>
        <article>
          <div class="cup warm"></div>
          <h3>肉桂卷</h3>
          <p>适合下午茶的甜点。</p>
          <strong>22</strong>
        </article>
      </div>
    </section>

    <section class="section story">
      <div>
        <span>Space</span>
        <h2>适合阅读、聊天和轻办公。</h2>
      </div>
      <p>用 CSS 色块代替真实图片，练习页面留白、分栏和色彩搭配。你可以在这里替换成真实店铺照片。</p>
    </section>

    <section id="visit" class="visit">
      <div>
        <h2>到店信息</h2>
        <p>地址：学习路 18 号</p>
        <p>时间：09:00 - 21:00</p>
      </div>
      <a href="#">预约座位</a>
    </section>
  </main>
</body>
</html>
