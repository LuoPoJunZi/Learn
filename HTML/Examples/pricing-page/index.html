<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>价格卡片页面</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <p>Pricing</p>
    <h1>选择适合你的学习计划。</h1>
    <span>这是一个价格卡片布局练习，可以改成课程、会员或工具定价。</span>
  </header>

  <main class="pricing-grid">
    <article class="plan">
      <h2>基础版</h2>
      <p>适合刚开始学习的人。</p>
      <strong>0</strong>
      <ul>
        <li>基础教程入口</li>
        <li>每周练习清单</li>
        <li>公开学习记录</li>
      </ul>
      <a href="#">开始学习</a>
    </article>

    <article class="plan featured">
      <div class="label">推荐</div>
      <h2>进阶版</h2>
      <p>适合想持续练项目的人。</p>
      <strong>29</strong>
      <ul>
        <li>全部基础内容</li>
        <li>项目案例拆解</li>
        <li>代码检查清单</li>
      </ul>
      <a href="#">选择进阶版</a>
    </article>

    <article class="plan">
      <h2>团队版</h2>
      <p>适合小组一起学习。</p>
      <strong>99</strong>
      <ul>
        <li>多人学习路线</li>
        <li>共享项目模板</li>
        <li>复盘会议记录</li>
      </ul>
      <a href="#">联系团队</a>
    </article>
  </main>
</body>
</html>
